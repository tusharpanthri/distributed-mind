name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Type-check with mypy
        run: mypy engines/ benchmark/ data/ --ignore-missing-imports

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Java (for PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run unit tests
        run: pytest tests/test_engines.py -v --timeout=60

  integration-tests:
    name: Integration Tests (MinIO + 50k sample)
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      minio:
        image: minio/minio:RELEASE.2024-05-01T01-11-10Z
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET_RAW: raw-data
      MINIO_BUCKET_OUTPUT: processed-data

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Java (for PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Create MinIO buckets
        run: |
          pip install minio
          python - <<'EOF'
          from minio import Minio
          client = Minio("localhost:9000", access_key="minioadmin", secret_key="minioadmin", secure=False)
          for bucket in ["raw-data", "processed-data"]:
              if not client.bucket_exists(bucket):
                  client.make_bucket(bucket)
          print("Buckets created")
          EOF

      - name: Download sample GH Archive data (50k rows, 1 hour)
        run: |
          python -m data.download_gharchive_data \
            --date 2024-01-15 \
            --hours 1 \
            --sample-size 50000

      - name: Run data integrity tests
        run: pytest tests/test_data_integrity.py -v --timeout=300

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: distributedmind:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
