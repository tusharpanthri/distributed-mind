version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object store
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-05-01T01-11-10Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console (http://localhost:9001)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # MinIO bucket initialiser — creates buckets then exits
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2024-04-18T16-45-29Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/raw-data &&
        mc mb --ignore-existing local/processed-data &&
        echo 'Buckets ready.'
      "
    restart: "no"

  # ---------------------------------------------------------------------------
  # Benchmark — runs the full pipeline
  # ---------------------------------------------------------------------------
  benchmark:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_RAW: raw-data
      MINIO_BUCKET_OUTPUT: processed-data
      # botocore >=1.36 defaults to checksum headers this MinIO release
      # rejects on bulk-delete/overwrite calls (used by Dask's to_parquet).
      AWS_REQUEST_CHECKSUM_CALCULATION: when_required
      AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
    volumes:
      - ./results:/app/results
      - ./config:/app/config
    command:
      - "-m"
      - "benchmark.runner"
      - "--engines"
      - "spark,dask,ray"

volumes:
  minio_data:
